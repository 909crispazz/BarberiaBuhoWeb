<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>BO BARBER - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body class="admin-body">

    <div class="login-container">
        <form id="login-form" class="login-form panel">
            <h2>Acceso de Administrador</h2>
            <p>Inicia sesión para administrar las citas y horarios.</p>
            
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" required />
            
            <label for="password">Contraseña</label>
            <input type="password" id="password" required />
            
            <p id="login-error" class="error-message"></p>
            
            <button type="submit" class="submit-btn">Ingresar</button>
        </form>
    </div>

    <script type="module">
        // --- Importaciones de Firebase ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword 
        } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

        // --- Configuración de Firebase (la que me diste) ---
        const firebaseConfig = {
            apiKey: "AIzaSyAAjL_Tur33-tbZa4kC8OoQYF2jNXEKd4o",
            authDomain: "barberiaappenrique.firebaseapp.com",
            projectId: "barberiaappenrique",
            storageBucket: "barberiaappenrique.firebasestorage.app",
            messagingSenderId: "181014839149",
            appId: "1:181014839149:web:664079f16c68628af72464",
            measurementId: "G-BWG46JCZDK"
        };

        // --- Inicializar Firebase ---
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- Lógica del formulario de login ---
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitButton = loginForm.querySelector('.submit-btn');
            
            loginError.textContent = ''; // Limpia errores
            submitButton.disabled = true;
            submitButton.textContent = 'Ingresando...';

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // ¡Éxito! Redirigir al panel de admin
                    window.location.href = 'admin.html';
                })
                .catch((error) => {
                    // ¡Error!
                    console.error(error.code, error.message);
                    loginError.textContent = 'Correo o contraseña incorrectos.';
                    submitButton.disabled = false;
                    submitButton.textContent = 'Ingresar';
                });
        });
    </script>
</body>
</html>
